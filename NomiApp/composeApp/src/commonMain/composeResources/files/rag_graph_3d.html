<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Knowledge Graph</title>
    <style>
        body {
            margin: 0;
            background-color: #020617;
            overflow: hidden;
            font-family: sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }
        #graph-canvas {
            width: 100vw;
            height: 100vh;
        }
    </style>
    <script src="https://unpkg.com/3d-force-graph@1.73.3/dist/3d-force-graph.min.js"></script>
</head>
<body>
    <div id="graph-canvas"></div>

    <script>
        const elem = document.getElementById('graph-canvas');
        let Graph = null;

        function initGraph() {
            Graph = ForceGraph3D()(elem)
                .backgroundColor('#020617')
                .showNavInfo(false)
                .nodeLabel(node => `${node.label} [${node.nodeType}]`)
                .nodeColor(node => node.color || '#fbbf24')
                .nodeRelSize(6)
                .nodeOpacity(0.9)
                .onNodeClick(node => {
                    // Send message via WebViewJsBridge
                    if (window.jsBridge) {
                        window.jsBridge.callNative(
                            "postMessage", 
                            JSON.stringify({ event: "node_clicked", id: node.id }),
                            (res) => {}
                        );
                    }
                })
                .linkWidth(1)
                .linkOpacity(0.3)
                .linkColor(() => '#94a3b8')
                .linkDirectionalParticles(2)
                .linkDirectionalParticleSpeed(0.005)
                .linkDirectionalParticleWidth(2)
                .linkLabel(link => link.relationship)
                .forceEngine('d3');

            const controls = Graph.controls();
            if (controls) {
                controls.enableDamping = true;
                controls.dampingFactor = 0.1;
            }
        }

        window.update3DGraph = function(jsonDataString) {
            if (!Graph) initGraph();
            try {
                const graphData = JSON.parse(jsonDataString);
                Graph.graphData(graphData);
                
                setTimeout(() => {
                    Graph.zoomToFit(800, 100);
                }, 100);
            } catch (e) {
                console.error("Failed to update graph", e);
            }
        };

        window.addEventListener('resize', () => {
            if (Graph) {
                Graph.width(window.innerWidth);
                Graph.height(window.innerHeight);
            }
        });

        initGraph();
    </script>
</body>
</html>
