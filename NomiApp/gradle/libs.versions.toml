jetbrains-navigation3-ui = { module = "org.jetbrains.androidx.navigation3:navigation3-ui", version.ref = "multiplatform-nav3-ui" }
#Firebase
#Android
firebase-bom = {module="com.google.firebase:firebase-bom",version.ref="firebase"}
firebase-analytics={module="com.google.firebase:firebase-analytics"}
firebase-messaging={module="com.google.firebase:firebase-messaging"}
firebase-crashlytics = {module="com.google.firebase:firebase-crashlytics"}

#datepicker
date-picker = { module = "network.chaintech:kmp-date-time-picker", version.ref = "date-picker" }

kotlinx-coroutine = { module = "org.jetbrains.kotlinx:kotlinx-coroutines-core", version.ref = "kotlinx-coroutines" }

kotlinx-datetime = { module = "org.jetbrains.kotlinx:kotlinx-datetime", version.ref = "datetime" }


ktor-client-core = { module = "io.ktor:ktor-client-core", version.ref = "ktor" }
