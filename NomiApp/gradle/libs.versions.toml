#File Kit
file-kit-core = { module = "io.github.vinceglb:filekit-core", version.ref = "fileKit" }
file-kit-dialogs = { module = "io.github.vinceglb:filekit-dialogs", version.ref = "fileKit" }
file-kit-dialogs-compose = { module = "io.github.vinceglb:filekit-dialogs-compose", version.ref = "fileKit" }
file-kit-coil = { module = "io.github.vinceglb:filekit-coil", version.ref = "fileKit" }

#chart
chart = { module = "io.github.thechance101:chart", version = "1.1.0" }

#web
kotlinx-browser = { module = "org.jetbrains.kotlinx:kotlinx-browser", version.ref = "kotlinx-browser" }
kotlinx-serialization-json = { module = "org.jetbrains.kotlinx:kotlinx-serialization-json", version.ref = "kotlinx-serialization" }

ktor-client-js = { module = "io.ktor:ktor-client-js", version.ref = "ktor" }

ui = { module = "org.jetbrains.compose.ui:ui", version.ref = "ui" }
