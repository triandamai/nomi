services:
  db:
    # Use the official pgvector image with Postgres 16
    image: pgvector/pgvector:pg16
    container_name: open-agent-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: open_agent
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d open_agent"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: